name: Build and Release macOS App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 FFmpeg
        run: brew install ffmpeg

      - name: 安装 Python 依赖
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用 PyInstaller 打包 .app
        run: |
          pyinstaller SmartShortsToolkit.spec --noconfirm

      - name: 生成 .dmg 安装包
        run: |
          cd dist
          hdiutil create -volname "Smart Shorts Toolkit" \
            -srcfolder "Smart Shorts Toolkit.app" \
            -ov -format UDZO \
            "Smart Shorts Toolkit.dmg"

      - name: 生成构件证明（Artifact Attestation）
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/Smart Shorts Toolkit.dmg"

      - name: 创建 Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Smart Shorts Toolkit.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
